services:
  mongo:
    image: mongo:7
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db

  web:
    build: .
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      - mongo

  crawler:
    build: .
    restart: always
    command: python updateDatabase.py
    environment:
      - MONGO_URI=mongodb://mongo:27017
    depends_on:
      - mongo
